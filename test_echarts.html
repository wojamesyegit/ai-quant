<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ECharts Test</title>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
</head>
<body>
<h2>ECharts 加载测试</h2>
<div id="test" style="width:600px;height:400px;"></div>
<script>
(function(){
  var c = echarts.init(document.getElementById('test'));
  c.setOption({
    title: {text:'测试图表'},
    xAxis: {data:['A','B','C']},
    yAxis: {},
    series: [{type:'bar',data:[10,20,30]}]
  });
})();
</script>
</body>
</html>
